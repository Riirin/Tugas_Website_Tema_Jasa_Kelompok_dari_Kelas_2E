;w<!DOCTYPE html>
<html lang="in">
<head>
    <meta charset="UTF-8">
    <title>Ceafood - Pembayaran Berhasil</title>

    <style>
        body {
            background-color: #737CA1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            margin: 0;
            padding: 0;
        }

        nav {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.2);
        }

        nav a {
            color: #ffcc00;
            text-decoration: none;
            font-weight: bold;
            margin: 0 15px;
            font-size: 18px;
        }

        nav a:hover {
            color: white;
        }

        .success-card {
            background-color: white;
            color: #333;
            width: 100%;
            max-width: 700px;
            margin: 50px auto;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            text-align: center;
            box-sizing: border-box;
        }

        .success-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .success-text {
            color: #555;
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .rating {
            font-size: 35px;
            color: gold;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding: 12px;
            font-size: 15px;
            resize: none;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .btn-submit {
            display: inline-block;
            margin-top: 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 17px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-submit:hover {
            background-color: #1a252f;
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-bottom: 20px;
            color: white;
        }

        .rating span {
    cursor: pointer;
        color: rgb(255, 242, 2);
            transition: 0.2s;
        }

        .rating span:hover {
            transform: scale(1.2);
        }   

    </style>
</head>

<body>

    <nav>
        <a href="index.html">Home</a> | 
        <a href="menu.html">Daftar Menu</a> | 
        <a href="order.html">Pesan Sekarang</a>
    </nav>

    <div class="success-card">

        <img src="sukses.jpeg" alt="Pembayaran Berhasil" class="success-img">

        <h1>🎉 Pembayaran Berhasil!</h1>

        <p class="success-text">
            Terima kasih telah memesan di <b>Ceafood</b>.  
            Pesanan seafood Anda sedang diproses dan akan segera dikirim ke lokasi tujuan.
        </p>

        <h2>Beri Umpan Balik</h2>

        <textarea id="feedback" placeholder="Bagikan pengalaman Anda menikmati seafood dari Ceafood..."></textarea>

        <br>
        <a href="Index.html">
        <button class="btn-submit" onclick="sendFeedback()">
         Kirim Feedback
        </button>
        </a>
    </div>

    <center>
        <hr style="border: 0.5px solid rgba(255,255,255,0.3); width: 80%;">
        <footer>&copy; 2026 Ceafood - Mid Project Kelompok Website Jasa Delivery</footer>
    </center>
</body>
</html>
